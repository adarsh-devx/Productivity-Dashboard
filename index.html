<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div id="main">
      <section class="allElems">
        <header>

        </header>
        
       <div class="allFeatures">
         <div class="todo elem" id="0">
          <img
            src="https://plus.unsplash.com/premium_photo-1710962184909-f9f8dc2c9f5f?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>To Do List</h2>
        </div>
        <div class="daily elem" id="1">
          <img
            src="https://images.unsplash.com/photo-1677249490921-3246e81f19e3?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Daily Planner</h2>
        </div>
        <div class="moti elem" id="2">
          <img
            src="https://images.unsplash.com/photo-1648457147590-ef7dbec3cfc2?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Motivation</h2>
        </div>
        <div class="pomo elem" id="3">
          <img
            src="https://images.unsplash.com/photo-1718202248232-0cdbc15d29b2?q=80&w=1364&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Pomodoro Timer</h2>
        </div>
        <div class="goals elem" id="4">
          <img
            src="https://images.unsplash.com/photo-1636517687963-5299dab44ed4?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Daily Goals</h2>
        </div>
       </div>
      </section>

      <section class="fullElem todo-list-fullpage">
        <button class="back" id="0"><i class="ri-close-line"></i> Close</button>
        <h2>Your Personalized Task List</h2>
        <div class="todo-container">
          <div class="addTask">
            <form>
              <input id="task-input" type="text" placeholder="Task Title" />
              <textarea placeholder="Task Description" name="" id=""></textarea>
              <div class="mark-imp">
                <input type="checkbox" name="" id="check" />
                <label for="check">Important Task!</label>
              </div>
              <button>Add Task</button>
            </form>
          </div>
          <div class="allTask"></div>
        </div>
      </section>
      <section class="fullElem daily-planner-fullpage">
        <button class="back" id="1"><i class="ri-close-line"></i> Close</button>
        <h2>Plan your Day to be more Productive</h2>

        <div class="day-planner"></div>
      </section>
      <section class="fullElem motivation-fullpage">
        <button class="back" id="2"><i class="ri-close-line"></i> Close</button>
        <div class="motivation-container">
          <div class="motivation-wrapper">
            <div class="motivation-header">
              <i class="ri-double-quotes-l quote-icon"></i>
              <span class="quote-title">Quote of the Day</span>
            </div>
            <div class="motivation-body">
              <h1 class="quote-text"></h1>
            </div>
            <div class="motivation-footer">
              <span class="author-name"></span>
            </div>
          </div>
        </div>
      </section>
      <section class="fullElem pomodoro-fullpage">
        <button class="back" id="3"><i class="ri-close-line"></i> Close</button>
        <h2>Study with me!</h2>

        <h4 class="session">Work Session</h4>

        <div class="pomo-timer">
          <h1>25:00</h1>
          <button class="start-timer">Start</button>
          <button class="pause-timer">Pause</button>
          <button class="reset-timer">Reset</button>
        </div>
      </section>
      <section class="fullElem daily-goals-fullpage">
        <button class="back" id="4"><i class="ri-close-line"></i> Close</button>
        <h1>Daily Goals</h1>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
